# 每次 push / PR 自動跑完整測試（不需要 GPU：Whisper 與 Gemini 都以假物件注入）
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-cloud.txt
          pip install pytest httpx
      - name: Run tests
        run: pytest -q
